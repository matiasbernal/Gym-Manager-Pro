<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gym Manager Pro - Matías Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f1f5f9; }
        .dark body { background-color: #0f172a; }
        .active-view { border-left: 4px solid #2563eb; background-color: #eff6ff; color: #1e40af; }
        .dark .active-view { background-color: #1e293b; color: #60a5fa; border-left: 4px solid #3b82f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="transition-colors duration-200">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const initialData = {
            clientes: [
                { id: 1, nombre: "Juan Pérez", objetivo: "Hipertrofia", peso: 85, altura: 180, lesiones: "Molestia leve en hombro derecho", cargas: [], rutinas: [] },
                { id: 2, nombre: "Ana García", objetivo: "Pérdida de Grasa", peso: 64, altura: 165, lesiones: "Ninguna", cargas: [], rutinas: [] }
            ],
            clases: [
                { id: 101, nombre: "Crossfit Mañana", rutinas: [] },
            ],
            recordatorios: []
        };

        const formatFecha = (str) => {
            if(!str) return '';
            const [y, m, d] = str.split('-');
            return `${d}-${m}-${y}`;
        };

        const truncar = (txt, limite = 30) => {
            if (!txt) return "";
            return txt.length > limite ? txt.substring(0, limite) + "..." : txt;
        };

        const RenderSpecs = ({ e, gen }) => {
            const displayS = e.s || (gen ? gen.split('x')[0] : '');
            const displayR = e.r || (gen ? gen.split('x')[1] : '');
            if (e.t) return <span className="font-bold text-slate-700 dark:text-slate-300">{e.t}</span>;
            if (displayS && displayR) return <span className="font-bold text-slate-700 dark:text-slate-300">{displayS}x{displayR}</span>;
            if (gen) return <span className="font-bold text-slate-700 dark:text-slate-300">{gen}</span>;
            return null;
        };

        const App = () => {
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('gymData_matias');
                return saved ? JSON.parse(saved) : initialData;
            });
            const [vista, setVista] = useState('inicio');
            const [seleccionado, setSeleccionado] = useState(null);
            const [modal, setModal] = useState({ abierto: false, tipo: '', editando: null });
            
            // Estado para Modo Oscuro
            const [isDark, setIsDark] = useState(() => {
                return localStorage.getItem('theme_matias') === 'dark';
            });

            useEffect(() => { localStorage.setItem('gymData_matias', JSON.stringify(data)); }, [data]);
            
            useEffect(() => {
                if (isDark) {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('theme_matias', 'dark');
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('theme_matias', 'light');
                }
            }, [isDark]);

            const guardarEntidad = (tipo, entidad) => {
                const newData = { ...data };
                if (entidad.id) newData[tipo] = newData[tipo].map(item => item.id === entidad.id ? entidad : item);
                else { entidad.id = Date.now(); newData[tipo].push(entidad); }
                setData(newData);
                if (seleccionado && seleccionado.id === entidad.id) setSeleccionado(entidad);
            };

            const eliminarRutinaCliente = (clienteId, rutinaId) => {
                const cliente = data.clientes.find(c => c.id === clienteId);
                if (!cliente) return;
                const nuevasRutinas = cliente.rutinas.filter(r => r.id !== rutinaId);
                const clienteActualizado = { ...cliente, rutinas: nuevasRutinas };
                guardarEntidad('clientes', clienteActualizado);
                if (seleccionado && seleccionado.id === clienteId) setSeleccionado(clienteActualizado);
            };

            const eliminarRutinaClase = (claseId, rutinaId) => {
                const clase = data.clases.find(c => c.id === claseId);
                if (!clase) return;
                const nuevasRutinas = clase.rutinas.filter(r => r.id !== rutinaId);
                const claseActualizada = { ...clase, rutinas: nuevasRutinas };
                guardarEntidad('clases', claseActualizada);
                if (seleccionado && seleccionado.id === claseId) setSeleccionado(claseActualizada);
            };

            const eliminarRecordatorio = (id) => {
                const nuevos = data.recordatorios.filter(r => r.id !== id);
                setData({ ...data, recordatorios: nuevos });
            };

            const compartirWhatsApp = (rutina, esClase = false) => {
                let texto = `RUTINA: ${rutina.nombre.toUpperCase()}\n`;
                if(esClase) texto += `Fecha Clase: ${formatFecha(rutina.fechaClase)}\n`;
                if(esClase && rutina.numVueltas) texto += `🔄 ${rutina.numVueltas} VUELTAS\n`;
                if(esClase && rutina.tiempoGeneral) texto += `⏱️ TIEMPO GENERAL: ${rutina.tiempoGeneral} seg\n`;
                
                const exportarBloque = (titulo, ejercicios, general) => {
                    if(!ejercicios || ejercicios.length === 0) return "";
                    let b = `\n${titulo} [${general || ''}]\n`;
                    ejercicios.forEach(e => {
                        const s = e.s || (general ? general.split('x')[0] : '');
                        const r = e.r || (general ? general.split('x')[1] : '');
                        let spec = e.t ? e.t : (s && r ? `${s}x${r}` : general || '');
                        b += `- ${e.ej} ${spec}\n`;
                        if(e.inst) b += `  (Nota: ${e.inst})\n`;
                    });
                    return b;
                };
                if(rutina.dias) {
                    rutina.dias.forEach(dia => {
                        texto += `\n--- ${dia.nombre.toUpperCase()} ---`;
                        texto += exportarBloque('ENTRADA EN CALOR', dia.entrada, dia.genEntrada);
                        texto += exportarBloque('RUTINA PRINCIPAL', dia.principal, dia.genPrincipal);
                    });
                } else {
                    texto += exportarBloque('ENTRADA EN CALOR', rutina.entrada, rutina.generalEntrada);
                    texto += exportarBloque('RUTINA PRINCIPAL', rutina.principal, rutina.generalPrincipal);
                }
                window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
            };

            return (
                <div className={`flex flex-col lg:flex-row h-screen overflow-hidden ${isDark ? 'dark bg-slate-900' : 'bg-slate-50'}`}>
                    <aside className="w-full lg:w-64 bg-white dark:bg-slate-800 border-b lg:border-b-0 lg:border-r dark:border-slate-700 flex flex-col shadow-lg transition-colors">
                        <div className="p-6 border-b dark:border-slate-700 font-black text-blue-600 dark:text-blue-400 tracking-tighter cursor-pointer" onClick={() => setVista('inicio')}>GYM ADMIN PRO</div>
                        <nav className="flex-1 overflow-y-auto p-4 space-y-1 text-sm text-slate-700 dark:text-slate-300">
                            <button onClick={() => setVista('inicio')} className={`w-full text-left p-2 rounded-lg font-semibold ${vista === 'inicio' ? 'active-view' : 'hover:bg-slate-100 dark:hover:bg-slate-700'}`}>Dashboard Inicio</button>
                            <div className="pt-4 pb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Clientes</div>
                            {data.clientes.map(c => (
                                <button key={c.id} onClick={() => { setSeleccionado(c); setVista('cliente'); }} className={`w-full text-left p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 ${seleccionado?.id === c.id && vista === 'cliente' ? 'active-view' : ''}`}>{c.nombre}</button>
                            ))}
                            <button onClick={() => setModal({abierto: true, tipo: 'cliente', editando: null})} className="w-full text-blue-600 dark:text-blue-400 text-xs font-bold p-2 text-left">+ Nuevo Cliente</button>
                            <div className="pt-4 pb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Clases</div>
                            {data.clases.map(c => (
                                <button key={c.id} onClick={() => { setSeleccionado(c); setVista('clase'); }} className={`w-full text-left p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 ${seleccionado?.id === c.id && vista === 'clase' ? 'active-view' : ''}`}>{c.nombre}</button>
                            ))}
                            <button onClick={() => setModal({abierto: true, tipo: 'clase'})} className="w-full text-indigo-600 dark:text-indigo-400 text-xs font-bold p-2 text-left">+ Nueva Clase</button>
                            <button onClick={() => setVista('calendario')} className={`w-full text-left p-2 rounded-lg font-semibold mt-4 hover:bg-slate-100 dark:hover:bg-slate-700 ${vista === 'calendario' ? 'active-view' : ''}`}>Calendario Completo</button>
                        </nav>
                        <div className="p-4 border-t dark:border-slate-700">
                            <button onClick={() => setIsDark(!isDark)} className="w-full flex justify-center items-center gap-2 p-2 rounded-lg font-bold text-sm bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200">
                                {isDark ? '☀️ Modo Claro' : '🌙 Modo Oscuro'}
                            </button>
                        </div>
                    </aside>

                    <main className="flex-1 overflow-y-auto bg-slate-50 dark:bg-slate-900 transition-colors">
                        {vista === 'inicio' && <VistaInicio data={data} setVista={setVista} setSeleccionado={setSeleccionado} setModal={setModal} />}
                        {vista === 'cliente' && seleccionado && (
                            <VistaCliente 
                                cliente={seleccionado} 
                                onEditarFicha={() => setModal({abierto: true, tipo: 'cliente', editando: seleccionado})}
                                onNuevaRutina={() => setModal({abierto: true, tipo: 'rutinaCliente'})}
                                onEditarRutina={(r) => setModal({abierto: true, tipo: 'rutinaCliente', editando: r})}
                                onEliminarRutina={(rutinaId) => eliminarRutinaCliente(seleccionado.id, rutinaId)}
                                onCompartir={(r) => compartirWhatsApp(r)}
                                onUpdateCargas={(cargas) => guardarEntidad('clientes', {...seleccionado, cargas})}
                            />
                        )}
                        {vista === 'clase' && seleccionado && (
                            <VistaClase 
                                clase={seleccionado} 
                                onNuevaRutina={() => setModal({abierto: true, tipo: 'rutinaClase'})}
                                onEditar={(r) => setModal({abierto: true, tipo: 'rutinaClase', editando: r})}
                                onEliminarRutina={(rutinaId) => eliminarRutinaClase(seleccionado.id, rutinaId)}
                                onCompartir={(r) => compartirWhatsApp(r, true)}
                                onEliminarClase={(id) => {
                                    const nuevasClases = data.clases.filter(c => c.id !== id);
                                    setData({...data, clases: nuevasClases});
                                    setSeleccionado(null);
                                    setVista('inicio');
                                }}
                            />
                        )}
                        {vista === 'calendario' && <VistaCalendario recordatorios={data.recordatorios} clientes={data.clientes} onNuevo={() => setModal({abierto: true, tipo: 'recordatorio', editando: null})} onEditar={(rec) => setModal({abierto: true, tipo: 'recordatorio', editando: rec})} onEliminar={eliminarRecordatorio} />}
                    </main>

                    {modal.abierto && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white dark:bg-slate-800 rounded-3xl shadow-2xl max-w-6xl w-full max-h-[90vh] overflow-y-auto p-8 text-slate-800 dark:text-slate-100">
                                {modal.tipo === 'cliente' && <FormCliente editando={modal.editando} onCerrar={() => setModal({abierto: false})} onGuardar={(c) => guardarEntidad('clientes', c)} />}
                                {modal.tipo === 'clase' && <FormClase onCerrar={() => setModal({abierto: false})} onGuardar={(c) => guardarEntidad('clases', c)} />}
                                {modal.tipo === 'rutinaClase' && <FormRutinaClase editando={modal.editando} onCerrar={() => setModal({abierto: false})} onGuardar={(r) => {
                                    const actual = {...seleccionado};
                                    if(r.id) actual.rutinas = actual.rutinas.map(item => item.id === r.id ? r : item);
                                    else { r.id = Date.now(); r.fechaCreacion = new Date().toISOString().split('T')[0]; actual.rutinas.push(r); }
                                    guardarEntidad('clases', actual);
                                }} />}
                                {modal.tipo === 'rutinaCliente' && <FormRutinaCliente editando={modal.editando} onCerrar={() => setModal({abierto: false})} onGuardar={(r) => {
                                    const actual = {...seleccionado};
                                    if(!actual.rutinas) actual.rutinas = [];
                                    if(r.id) actual.rutinas = actual.rutinas.map(item => item.id === r.id ? r : item);
                                    else { r.id = Date.now(); actual.rutinas.push(r); }
                                    guardarEntidad('clientes', actual);
                                }} />}
                                {modal.tipo === 'recordatorio' && <FormRecordatorio clientes={data.clientes} editando={modal.editando} onCerrar={() => setModal({abierto: false})} onGuardar={(rec) => guardarEntidad('recordatorios', rec)} />}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const VistaInicio = ({ data, setVista, setSeleccionado, setModal }) => {
            const proximos = useMemo(() => {
                return [...data.recordatorios]
                    .sort((a, b) => new Date(a.fecha) - new Date(b.fecha))
                    .slice(0, 5);
            }, [data.recordatorios]);
            return (
                <div className="p-8 max-w-6xl mx-auto">
                    <h2 className="text-4xl font-black mb-8 text-slate-800 dark:text-white">Hola, Matías</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div className="bg-blue-600 text-white p-6 rounded-3xl shadow-lg">
                            <p className="text-blue-100 font-bold text-xs uppercase tracking-widest">Clientes Activos</p>
                            <p className="text-5xl font-black mt-2">{data.clientes.length}</p>
                        </div>
                        <div className="bg-indigo-600 text-white p-6 rounded-3xl shadow-lg">
                            <p className="text-indigo-100 font-bold text-xs uppercase tracking-widest">Clases Grupales</p>
                            <p className="text-5xl font-black mt-2">{data.clases.length}</p>
                        </div>
                        <div className="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-700">
                            <p className="text-slate-400 font-bold text-xs uppercase tracking-widest">Tareas Pendientes</p>
                            <p className="text-5xl font-black mt-2 text-slate-800 dark:text-white">{data.recordatorios.length}</p>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-xl font-black dark:text-white">Próximos en Calendario</h3>
                                <button onClick={() => setVista('calendario')} className="text-blue-600 dark:text-blue-400 text-xs font-bold">Ver todo</button>
                            </div>
                            <div className="space-y-4">
                                {proximos.length > 0 ? proximos.map(rec => (
                                    <div key={rec.id} className="flex items-center gap-4 p-4 bg-slate-50 dark:bg-slate-700 rounded-2xl">
                                        <div className="bg-white dark:bg-slate-800 p-2 rounded-xl text-center min-w-[60px] border dark:border-slate-600 shadow-sm">
                                            <p className="text-[10px] font-black text-blue-600 dark:text-blue-400">{formatFecha(rec.fecha).split('-')[1]}</p>
                                            <p className="text-lg font-black dark:text-white">{formatFecha(rec.fecha).split('-')[0]}</p>
                                        </div>
                                        <div>
                                            <p className="font-black text-slate-800 dark:text-white">{data.clientes.find(c => c.id == rec.clienteId)?.nombre || 'General'}</p>
                                            <p className="text-xs text-slate-500 dark:text-slate-400 font-medium uppercase tracking-tighter">{rec.tipo}</p>
                                        </div>
                                    </div>
                                )) : <p className="text-slate-400 text-sm italic">No hay tareas agendadas...</p>}
                            </div>
                        </div>
                        <div className="bg-white dark:bg-slate-800 p-8 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700">
                            <h3 className="text-xl font-black mb-6 dark:text-white">Accesos Rápidos</h3>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                <button onClick={() => setModal({abierto: true, tipo: 'recordatorio', editando: null})} className="p-4 bg-slate-800 dark:bg-slate-600 text-white rounded-2xl font-bold text-sm hover:bg-slate-700 transition-colors">Agendar Tarea</button>
                                <button onClick={() => setModal({abierto: true, tipo: 'cliente', editando: null})} className="p-4 bg-blue-50 dark:bg-slate-700 text-blue-600 dark:text-blue-400 rounded-2xl font-bold text-sm border border-blue-100 dark:border-slate-600">Nuevo Cliente</button>
                                <button onClick={() => setModal({abierto: true, tipo: 'clase'})} className="p-4 bg-indigo-50 dark:bg-slate-700 text-indigo-600 dark:text-indigo-400 rounded-2xl font-bold text-sm border border-indigo-100 dark:border-slate-600">Nueva Clase</button>
                                <button onClick={() => setVista('calendario')} className="p-4 bg-orange-50 dark:bg-slate-700 text-orange-600 dark:text-orange-400 rounded-2xl font-bold text-sm border border-orange-100 dark:border-slate-600">Calendario</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const VistaCliente = ({ cliente, onEditarFicha, onNuevaRutina, onEditarRutina, onEliminarRutina, onCompartir, onUpdateCargas }) => {
            const [nuevoPeso, setNuevoPeso] = useState({ ej: '', peso: '', fecha: new Date().toISOString().split('T')[0] });
            const cargasAgrupadas = (cliente.cargas || []).reduce((acc, curr) => {
                const nombreKey = curr.ej.trim().toLowerCase();
                if (!acc[nombreKey]) acc[nombreKey] = { nombre: curr.ej, registros: [] };
                acc[nombreKey].registros.push(curr);
                return acc;
            }, {});

            return (
                <div className="p-8 max-w-6xl mx-auto">
                    <div className="flex justify-between items-end mb-8">
                        <div>
                            <h2 className="text-4xl font-black text-slate-800 dark:text-white">{cliente.nombre}</h2>
                            <p className="text-slate-500 font-medium tracking-tight">Ficha Técnica Completa</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={onEditarFicha} className="bg-white dark:bg-slate-800 border dark:border-slate-600 text-slate-600 dark:text-slate-300 px-6 py-2 rounded-xl font-bold shadow-sm">Editar Ficha</button>
                            <button onClick={onNuevaRutina} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg">+ Crear Rutina</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border dark:border-slate-700">
                            <h3 className="font-bold text-slate-700 dark:text-slate-200 mb-4">Evolución de Cargas</h3>
                            <div className="space-y-4 mb-6 max-h-48 overflow-y-auto pr-2">
                                {Object.values(cargasAgrupadas).map((grupo, idx) => (
                                    <div key={idx} className="bg-slate-50 dark:bg-slate-700 p-3 rounded-xl">
                                        <p className="text-xs font-black text-blue-600 dark:text-blue-400 uppercase mb-2">{grupo.nombre}</p>
                                        <div className="flex gap-3 overflow-x-auto pb-1 hide-scrollbar">
                                            {grupo.registros.map((r, i) => (
                                                <div key={i} className="bg-white dark:bg-slate-800 border dark:border-slate-600 rounded-lg px-3 py-1 text-center min-w-[70px]">
                                                    <div className="text-sm font-black dark:text-white">{r.peso}kg</div>
                                                    <div className="text-[8px] text-slate-400">{formatFecha(r.fecha)}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="flex flex-wrap gap-2">
                                <input className="flex-1 min-w-[120px] p-2 border dark:border-slate-600 rounded-lg text-sm dark:bg-slate-700 dark:text-white" placeholder="Ejercicio" value={nuevoPeso.ej} onChange={e=>setNuevoPeso({...nuevoPeso, ej: e.target.value})} />
                                <input className="w-16 p-2 border dark:border-slate-600 rounded-lg text-sm dark:bg-slate-700 dark:text-white" placeholder="Kg" type="number" value={nuevoPeso.peso} onChange={e=>setNuevoPeso({...nuevoPeso, peso: e.target.value})} />
                                <input className="w-32 p-2 border dark:border-slate-600 rounded-lg text-[10px] dark:bg-slate-700 dark:text-white" type="date" value={nuevoPeso.fecha} onChange={e=>setNuevoPeso({...nuevoPeso, fecha: e.target.value})} />
                                <button onClick={() => { if(nuevoPeso.ej && nuevoPeso.peso) { onUpdateCargas([...(cliente.cargas||[]), nuevoPeso]); setNuevoPeso({...nuevoPeso, ej:'', peso:'', fecha: new Date().toISOString().split('T')[0]}); }}} className="bg-slate-800 dark:bg-blue-600 text-white px-3 rounded-lg text-xs font-bold">OK</button>
                            </div>
                        </div>
                        <div className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border dark:border-slate-700 text-sm">
                            <h3 className="font-bold text-slate-700 dark:text-slate-200 mb-4">Datos del Cliente</h3>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                <div className="p-3 bg-slate-50 dark:bg-slate-700 rounded-lg dark:text-slate-200"><strong>Objetivo:</strong><br/>{cliente.objetivo}</div>
                                <div className="p-3 bg-slate-50 dark:bg-slate-700 rounded-lg dark:text-slate-200"><strong>Físico:</strong><br/>{cliente.peso}kg / {cliente.altura}cm</div>
                                <div className="p-3 bg-slate-50 dark:bg-slate-700 rounded-lg col-span-1 lg:col-span-2 dark:text-slate-200"><strong>Lesiones / Obs:</strong><br/>{cliente.lesiones || 'Ninguna'}</div>
                            </div>
                        </div>
                    </div>

                    <h3 className="font-bold text-slate-700 dark:text-slate-200 mb-4 text-xl">Historial de Rutinas</h3>
                    <div className="space-y-6">
                        {cliente.rutinas?.map(r => (

                    <div className="grid md:grid-cols-1 gap-6">
                        {['entrada', 'principal'].map(type => (
                            <div key={type} className={`p-6 rounded-3xl border dark:border-slate-600 ${type==='entrada'?'bg-orange-50 dark:bg-slate-700':'bg-blue-50 dark:bg-slate-700'}`}>
                                <h3 className="font-black uppercase text-xs mb-4 dark:text-white">{type==='entrada'?'Entrada en Calor':'Principal'}</h3>
                                {form[type].map((r, i) => (
                                    <div key={i} className="flex gap-1 mb-2 items-center">
                                        <input className="flex-1 p-2 border dark:border-slate-600 rounded-lg text-[10px] dark:bg-slate-800 dark:text-white" placeholder="Ej" value={r.ej} onChange={e=>updateRow(type, i, 'ej', e.target.value)} />
                                        <input className="w-14 p-2 border dark:border-slate-600 rounded-lg text-[10px] dark:bg-slate-800 dark:text-white" placeholder="S x R" value={r.s} onChange={e=>updateRow(type, i, 's', e.target.value)} />
                                        <input className="w-16 p-2 border dark:border-slate-600 rounded-lg text-[10px] dark:bg-slate-800 dark:text-white" placeholder="Tiempo" value={r.t || ''} onChange={e => updateRow(type, i, 't', e.target.value)} onBlur={e => { let v = e.target.value.replace(/[^0-9]/g, ''); if(v) updateRow(type, i, 't', v + ' seg'); }} />
                                        <input className="w-32 p-2 border dark:border-slate-600 rounded-lg text-[10px] dark:bg-slate-800 dark:text-white" placeholder="Instrucciones" value={r.inst} onChange={e=>updateRow(type, i, 'inst', e.target.value)} />
                                        <button onClick={()=>setForm({...form, [type]: form[type].filter((_, idx) => idx !== i)})} className="text-red-400 font-bold px-1">×</button>
                                    </div>
                                ))}
                                <button onClick={()=>setForm({...form, [type]: [...form[type], {ej:'',s:'',r:'',t:'', inst:''}]})} className="text-[10px] font-black opacity-60 dark:opacity-80 dark:text-white">+ AGREGAR</button>
                            </div>
                        ))}
                    </div>
                    <div className="flex justify-end gap-3 pt-4"><button onClick={onCerrar} className="px-6 py-2 dark:text-slate-300">Cancelar</button><button onClick={()=>{onGuardar(form); onCerrar();}} className="bg-slate-800 dark:bg-blue-600 text-white px-8 py-3 rounded-2xl font-black">Guardar Plan</button></div>
                </div>
            );
        };

        const FormRecordatorio = ({ clientes, editando, onCerrar, onGuardar }) => {
            const [form, setForm] = useState(editando || { clienteId: '', fecha: new Date().toISOString().split('T')[0], tipo: 'cambiar rutina', detalle: '' });
            const [otroVisible, setOtroVisible] = useState(form.tipo === 'otro');
            const [otroTexto, setOtroTexto] = useState(form.tipo !== 'cambiar rutina' && form.tipo !== 'cambiar entrada en calor' ? form.tipo : '');
            
            useEffect(() => {
                setOtroVisible(form.tipo === 'otro');
                if(form.tipo !== 'otro') setOtroTexto('');
            }, [form.tipo]);
            
            const handleGuardar = () => {
                let tipoFinal = form.tipo;
                if (tipoFinal === 'otro') tipoFinal = otroTexto.trim() || 'Tarea personalizada';
                onGuardar({ ...form, tipo: tipoFinal });
                onCerrar();
            };
            
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black">{editando ? 'Editar Tarea' : 'Agendar Tarea'}</h2>
                    <select className="w-full p-3 border dark:border-slate-600 rounded-xl dark:bg-slate-700 dark:text-white" value={form.clienteId} onChange={e=>setForm({...form, clienteId: e.target.value})}>
                        <option value="">Seleccionar cliente</option>
                        {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
                    </select>
                    <input type="date" className="w-full p-3 border dark:border-slate-600 rounded-xl dark:bg-slate-700 dark:text-white" value={form.fecha} onChange={e=>setForm({...form, fecha: e.target.value})} />
                    
                    <select className="w-full p-3 border dark:border-slate-600 rounded-xl dark:bg-slate-700 dark:text-white" value={form.tipo} onChange={e=>setForm({...form, tipo: e.target.value})}>
                        <option value="cambiar rutina">Cambiar rutina</option>
                        <option value="cambiar entrada en calor">Cambiar entrada en calor</option>
                        <option value="otro">Otro (escribir abajo)</option>
                    </select>
                    
                    {otroVisible && (
                        <input className="w-full p-3 border dark:border-slate-600 rounded-xl dark:bg-slate-700 dark:text-white" placeholder="Describe la tarea..." value={otroTexto} onChange={e=>setOtroTexto(e.target.value)} />
                    )}
                    
                    <div className="flex justify-end gap-3">
                        <button onClick={onCerrar} className="px-6 py-2 font-bold dark:text-slate-300">Cancelar</button>
                        <button onClick={handleGuardar} className="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold">Guardar</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
