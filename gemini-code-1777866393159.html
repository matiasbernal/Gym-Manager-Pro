<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gym Manager Pro - Matías Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f1f5f9; }
        .active-view { border-left: 4px solid #2563eb; background-color: #eff6ff; color: #1e40af; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const initialData = {
            clientes: [
                { id: 1, nombre: "Juan Pérez", objetivo: "Hipertrofia", peso: 85, altura: 180, lesiones: "Molestia leve en hombro derecho", cargas: [], rutinas: [] },
                { id: 2, nombre: "Ana García", objetivo: "Pérdida de Grasa", peso: 64, altura: 165, lesiones: "Ninguna", cargas: [], rutinas: [] }
            ],
            clases: [
                { id: 101, nombre: "Crossfit Mañana", rutinas: [] },
            ],
            recordatorios: []
        };

        const formatFecha = (str) => {
            if(!str) return '';
            const [y, m, d] = str.split('-');
            return `${d}-${m}-${y}`;
        };

        const truncar = (txt, limite = 30) => {
            if (!txt) return "";
            return txt.length > limite ? txt.substring(0, limite) + "..." : txt;
        };

        const RenderSpecs = ({ e, gen }) => {
            const displayS = e.s || (gen ? gen.split('x')[0] : '');
            const displayR = e.r || (gen ? gen.split('x')[1] : '');
            if (e.t) return <span className="font-bold text-slate-700">{e.t} seg</span>;
            if (displayS && displayR) return <span className="font-bold text-slate-700">{displayS}x{displayR}</span>;
            return null;
        };

        const App = () => {
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('gymData_matias');
                return saved ? JSON.parse(saved) : initialData;
            });
            const [vista, setVista] = useState('inicio');
            const [seleccionado, setSeleccionado] = useState(null);
            const [modal, setModal] = useState({ abierto: false, tipo: '', editando: null });

            useEffect(() => { localStorage.setItem('gymData_matias', JSON.stringify(data)); }, [data]);

            const guardarEntidad = (tipo, entidad) => {
                const newData = { ...data };
                if (entidad.id) newData[tipo] = newData[tipo].map(item => item.id === entidad.id ? entidad : item);
                else { entidad.id = Date.now(); newData[tipo].push(entidad); }
                setData(newData);
                if (seleccionado && seleccionado.id === entidad.id) setSeleccionado(entidad);
            };

            const compartirWhatsApp = (rutina, esClase = false) => {
                let texto = `RUTINA: ${rutina.nombre.toUpperCase()}\n`;
                if(esClase) texto += `Fecha Clase: ${formatFecha(rutina.fechaClase)}\n`;
                const exportarBloque = (titulo, ejercicios, general) => {
                    if(!ejercicios || ejercicios.length === 0) return "";
                    let b = `\n${titulo} [${general || ''}]\n`;
                    ejercicios.forEach(e => {
                        const s = e.s || (general ? general.split('x')[0] : '');
                        const r = e.r || (general ? general.split('x')[1] : '');
                        let spec = e.t ? `${e.t} seg` : (s && r ? `${s}x${r}` : '');
                        b += `- ${e.ej} ${spec}\n`;
                        if(e.inst) b += `  (Nota: ${e.inst})\n`;
                    });
                    return b;
                };
                if(rutina.dias) {
                    rutina.dias.forEach(dia => {
                        texto += `\n--- ${dia.nombre.toUpperCase()} ---`;
                        texto += exportarBloque('ENTRADA EN CALOR', dia.entrada, dia.genEntrada);
                        texto += exportarBloque('RUTINA PRINCIPAL', dia.principal, dia.genPrincipal);
                    });
                } else {
                    texto += exportarBloque('ENTRADA EN CALOR', rutina.entrada, rutina.generalEntrada);
                    texto += exportarBloque('RUTINA PRINCIPAL', rutina.principal, rutina.generalPrincipal);
                }
                window.open(`https://wa.me/?text=${encodeURIComponent(texto)}`, '_blank');
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    <aside className="w-64 bg-white border-r flex flex-col shadow-lg">
                        <div className="p-6 border-b font-black text-blue-600 tracking-tighter cursor-pointer" onClick={() => setVista('inicio')}>GYM ADMIN PRO</div>
                        <nav className="flex-1 overflow-y-auto p-4 space-y-1 text-sm">
                            <button onClick={() => setVista('inicio')} className={`w-full text-left p-2 rounded-lg font-semibold ${vista === 'inicio' ? 'active-view' : ''}`}>Dashboard Inicio</button>
                            <div className="pt-4 pb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Clientes</div>
                            {data.clientes.map(c => (
                                <button key={c.id} onClick={() => { setSeleccionado(c); setVista('cliente'); }} className={`w-full text-left p-2 rounded-lg ${seleccionado?.id === c.id && vista === 'cliente' ? 'active-view' : ''}`}>{c.nombre}</button>
                            ))}
                            <button onClick={() => setModal({abierto: true, tipo: 'cliente', editando: null})} className="w-full text-blue-600 text-xs font-bold p-2 text-left">+ Nuevo Cliente</button>
                            <div className="pt-4 pb-2 text-[10px] font-black text-slate-400 uppercase tracking-widest px-2">Clases</div>
                            {data.clases.map(c => (
                                <button key={c.id} onClick={() => { setSeleccionado(c); setVista('clase'); }} className={`w-full text-left p-2 rounded-lg ${seleccionado?.id === c.id && vista === 'clase' ? 'active-view' : ''}`}>{c.nombre}</button>
                            ))}
                            <button onClick={() => setModal({abierto: true, tipo: 'clase'})} className="w-full text-indigo-600 text-xs font-bold p-2 text-left">+ Nueva Clase</button>
                            <button onClick={() => setVista('calendario')} className={`w-full text-left p-2 rounded-lg font-semibold mt-4 ${vista === 'calendario' ? 'active-view' : ''}`}>Calendario Completo</button>
                        </nav>
                    </aside>

                    <main className="flex-1 overflow-y-auto bg-slate-50">
                        {vista === 'inicio' && <VistaInicio data={data} setVista={setVista} setSeleccionado={setSeleccionado} setModal={setModal} />}
                        {vista === 'cliente' && seleccionado && (
                            <VistaCliente 
                                cliente={seleccionado} 
                                onEditarFicha={() => setModal({abierto: true, tipo: 'cliente', editando: seleccionado})}
                                onNuevaRutina={() => setModal({abierto: true, tipo: 'rutinaCliente'})}
                                onEditarRutina={(r) => setModal({abierto: true, tipo: 'rutinaCliente', editando: r})}
                                onCompartir={(r) => compartirWhatsApp(r)}
                                onUpdateCargas={(cargas) => guardarEntidad('clientes', {...seleccionado, cargas})}
                            />
                        )}
                        {vista === 'clase' && seleccionado && (
                            <VistaClase 
                                clase={seleccionado} 
                                onNuevaRutina={() => setModal({abierto: true, tipo: 'rutinaClase'})}
                                onEditar={(r) => setModal({abierto: true, tipo: 'rutinaClase', editando: r})}
                                onCompartir={(r) => compartirWhatsApp(r, true)}
                            />
                        )}
                        {vista === 'calendario' && <VistaCalendario recordatorios={data.recordatorios} clientes={data.clientes} onNuevo={() => setModal({abierto: true, tipo: 'recordatorio'})} />}
                    </main>

                    {modal.abierto && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-3xl shadow-2xl max-w-6xl w-full max-h-[90vh] overflow-y-auto p-8 text-slate-800">
                                {modal.tipo === 'cliente' && <FormCliente editando={modal.editando} onCerrar={() => setModal({abierto: false})} onGuardar={(c) => guardarEntidad('clientes', c)} />}
                                {modal.tipo === 'clase' && <FormClase onCerrar={() => setModal({abierto: false})} onGuardar={(c) => guardarEntidad('clases', c)} />}
                                {modal.tipo === 'rutinaClase' && <FormRutinaClase editando={modal.editando} onCerrar={() => setModal({abierto: false})} onGuardar={(r) => {
                                    const actual = {...seleccionado};
                                    if(r.id) actual.rutinas = actual.rutinas.map(item => item.id === r.id ? r : item);
                                    else { r.id = Date.now(); r.fechaCreacion = new Date().toISOString().split('T')[0]; actual.rutinas.push(r); }
                                    guardarEntidad('clases', actual);
                                }} />}
                                {modal.tipo === 'rutinaCliente' && <FormRutinaCliente editando={modal.editando} onCerrar={() => setModal({abierto: false})} onGuardar={(r) => {
                                    const actual = {...seleccionado};
                                    if(!actual.rutinas) actual.rutinas = [];
                                    if(r.id) actual.rutinas = actual.rutinas.map(item => item.id === r.id ? r : item);
                                    else { r.id = Date.now(); actual.rutinas.push(r); }
                                    guardarEntidad('clientes', actual);
                                }} />}
                                {modal.tipo === 'recordatorio' && <FormRecordatorio clientes={data.clientes} onCerrar={() => setModal({abierto: false})} onGuardar={(rec) => guardarEntidad('recordatorios', rec)} />}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const VistaInicio = ({ data, setVista, setSeleccionado, setModal }) => {
            const proximos = useMemo(() => {
                return [...data.recordatorios]
                    .sort((a, b) => new Date(a.fecha) - new Date(b.fecha))
                    .slice(0, 5);
            }, [data.recordatorios]);
            return (
                <div className="p-8 max-w-6xl mx-auto">
                    <h2 className="text-4xl font-black mb-8 text-slate-800">Hola, Matías</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                        <div className="bg-blue-600 text-white p-6 rounded-3xl shadow-lg">
                            <p className="text-blue-100 font-bold text-xs uppercase tracking-widest">Clientes Activos</p>
                            <p className="text-5xl font-black mt-2">{data.clientes.length}</p>
                        </div>
                        <div className="bg-indigo-600 text-white p-6 rounded-3xl shadow-lg">
                            <p className="text-indigo-100 font-bold text-xs uppercase tracking-widest">Clases Grupales</p>
                            <p className="text-5xl font-black mt-2">{data.clases.length}</p>
                        </div>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                            <p className="text-slate-400 font-bold text-xs uppercase tracking-widest">Tareas Pendientes</p>
                            <p className="text-5xl font-black mt-2 text-slate-800">{data.recordatorios.length}</p>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="text-xl font-black">Próximos en Calendario</h3>
                                <button onClick={() => setVista('calendario')} className="text-blue-600 text-xs font-bold">Ver todo</button>
                            </div>
                            <div className="space-y-4">
                                {proximos.length > 0 ? proximos.map(rec => (
                                    <div key={rec.id} className="flex items-center gap-4 p-4 bg-slate-50 rounded-2xl">
                                        <div className="bg-white p-2 rounded-xl text-center min-w-[60px] border shadow-sm">
                                            <p className="text-[10px] font-black text-blue-600">{formatFecha(rec.fecha).split('-')[1]}</p>
                                            <p className="text-lg font-black">{formatFecha(rec.fecha).split('-')[0]}</p>
                                        </div>
                                        <div>
                                            <p className="font-black text-slate-800">{data.clientes.find(c => c.id == rec.clienteId)?.nombre || 'General'}</p>
                                            <p className="text-xs text-slate-500 font-medium uppercase tracking-tighter">{rec.tipo}</p>
                                        </div>
                                    </div>
                                )) : <p className="text-slate-400 text-sm italic">No hay tareas agendadas...</p>}
                            </div>
                        </div>
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                            <h3 className="text-xl font-black mb-6">Accesos Rápidos</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => setModal({abierto: true, tipo: 'recordatorio'})} className="p-4 bg-slate-800 text-white rounded-2xl font-bold text-sm hover:bg-slate-700 transition-colors">Agendar Tarea</button>
                                <button onClick={() => setModal({abierto: true, tipo: 'cliente', editando: null})} className="p-4 bg-blue-50 text-blue-600 rounded-2xl font-bold text-sm border border-blue-100">Nuevo Cliente</button>
                                <button onClick={() => setModal({abierto: true, tipo: 'clase'})} className="p-4 bg-indigo-50 text-indigo-600 rounded-2xl font-bold text-sm border border-indigo-100">Nueva Clase</button>
                                <button onClick={() => setVista('calendario')} className="p-4 bg-orange-50 text-orange-600 rounded-2xl font-bold text-sm border border-orange-100">Calendario</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const VistaCliente = ({ cliente, onEditarFicha, onNuevaRutina, onEditarRutina, onCompartir, onUpdateCargas }) => {
            const [nuevoPeso, setNuevoPeso] = useState({ ej: '', peso: '', fecha: new Date().toISOString().split('T')[0] });
            const cargasAgrupadas = (cliente.cargas || []).reduce((acc, curr) => {
                const nombreKey = curr.ej.trim().toLowerCase();
                if (!acc[nombreKey]) acc[nombreKey] = { nombre: curr.ej, registros: [] };
                acc[nombreKey].registros.push(curr);
                return acc;
            }, {});

            return (
                <div className="p-8 max-w-6xl mx-auto">
                    <div className="flex justify-between items-end mb-8">
                        <div>
                            <h2 className="text-4xl font-black text-slate-800">{cliente.nombre}</h2>
                            <p className="text-slate-500 font-medium tracking-tight">Ficha Técnica Completa</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={onEditarFicha} className="bg-white border text-slate-600 px-6 py-2 rounded-xl font-bold shadow-sm">Editar Ficha</button>
                            <button onClick={onNuevaRutina} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg">+ Crear Rutina</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border">
                            <h3 className="font-bold text-slate-700 mb-4">Evolución de Cargas</h3>
                            <div className="space-y-4 mb-6 max-h-48 overflow-y-auto pr-2">
                                {Object.values(cargasAgrupadas).map((grupo, idx) => (
                                    <div key={idx} className="bg-slate-50 p-3 rounded-xl">
                                        <p className="text-xs font-black text-blue-600 uppercase mb-2">{grupo.nombre}</p>
                                        <div className="flex gap-3 overflow-x-auto pb-1 hide-scrollbar">
                                            {grupo.registros.map((r, i) => (
                                                <div key={i} className="bg-white border rounded-lg px-3 py-1 text-center min-w-[70px]">
                                                    <div className="text-sm font-black">{r.peso}kg</div>
                                                    <div className="text-[8px] text-slate-400">{formatFecha(r.fecha)}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="flex flex-wrap gap-2">
                                <input className="flex-1 min-w-[120px] p-2 border rounded-lg text-sm" placeholder="Ejercicio" value={nuevoPeso.ej} onChange={e=>setNuevoPeso({...nuevoPeso, ej: e.target.value})} />
                                <input className="w-16 p-2 border rounded-lg text-sm" placeholder="Kg" type="number" value={nuevoPeso.peso} onChange={e=>setNuevoPeso({...nuevoPeso, peso: e.target.value})} />
                                <input className="w-32 p-2 border rounded-lg text-[10px]" type="date" value={nuevoPeso.fecha} onChange={e=>setNuevoPeso({...nuevoPeso, fecha: e.target.value})} />
                                <button onClick={() => { if(nuevoPeso.ej && nuevoPeso.peso) { onUpdateCargas([...(cliente.cargas||[]), nuevoPeso]); setNuevoPeso({...nuevoPeso, ej:'', peso:'', fecha: new Date().toISOString().split('T')[0]}); }}} className="bg-slate-800 text-white px-3 rounded-lg text-xs font-bold">OK</button>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border text-sm">
                            <h3 className="font-bold text-slate-700 mb-4">Datos del Cliente</h3>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="p-3 bg-slate-50 rounded-lg"><strong>Objetivo:</strong><br/>{cliente.objetivo}</div>
                                <div className="p-3 bg-slate-50 rounded-lg"><strong>Físico:</strong><br/>{cliente.peso}kg / {cliente.altura}cm</div>
                                <div className="p-3 bg-slate-50 rounded-lg col-span-2"><strong>Lesiones / Obs:</strong><br/>{cliente.lesiones || 'Ninguna'}</div>
                            </div>
                        </div>
                    </div>

                    <h3 className="font-bold text-slate-700 mb-4 text-xl">Historial de Rutinas</h3>
                    <div className="space-y-6">
                        {cliente.rutinas?.map(r => (
                            <div key={r.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                <div className="flex justify-between items-start mb-4">
                                    <h4 className="text-2xl font-black text-slate-800">{r.nombre}</h4>
                                    <div className="flex gap-2">
                                        <button onClick={() => onCompartir(r)} className="text-green-600 bg-green-50 px-4 py-1 rounded-lg text-xs font-bold">WhatsApp</button>
                                        <button onClick={() => onEditarRutina(r)} className="text-blue-600 bg-blue-50 px-4 py-1 rounded-lg text-xs font-bold">Editar</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {r.dias.map((dia, dIdx) => (
                                        <div key={dIdx} className="bg-slate-50 p-4 rounded-2xl text-xs">
                                            <p className="font-black text-blue-600 mb-2 border-b pb-1 uppercase">{dia.nombre}</p>
                                            {dia.principal?.map((e, ei) => (
                                                <div key={ei} className="py-2 border-b border-white last:border-0 overflow-hidden">
                                                    <div className="flex justify-between">
                                                        <span className="font-bold truncate pr-2">{e.ej}</span>
                                                        <RenderSpecs e={e} gen={dia.genPrincipal} />
                                                    </div>
                                                    {e.inst && (
                                                        <p className="text-[10px] text-slate-500 italic mt-0.5 truncate" title={e.inst}>
                                                            {truncar(e.inst, 30)}
                                                        </p>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const VistaClase = ({ clase, onNuevaRutina, onCompartir, onEditar }) => (
            <div className="p-8 max-w-5xl mx-auto">
                <div className="flex justify-between items-end mb-10">
                    <div><h2 className="text-4xl font-black">{clase.nombre}</h2><p className="text-slate-400 font-bold uppercase text-xs tracking-widest">Planificación Grupal</p></div>
                    <button onClick={onNuevaRutina} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">+ Nueva Clase</button>
                </div>
                <div className="space-y-12">
                    {clase.rutinas?.sort((a,b)=>new Date(b.fechaClase)-new Date(a.fechaClase)).map(r => (
                        <div key={r.id} className="bg-white rounded-[2rem] border p-8 shadow-sm">
                            <div className="flex justify-between items-start mb-6">
                                <div><h3 className="text-3xl font-black">{r.nombre}</h3><p className="text-blue-600 font-bold">Fecha: {formatFecha(r.fechaClase)}</p></div>
                                <div className="text-right">
                                    <button onClick={() => onCompartir(r)} className="bg-green-500 text-white px-6 py-2 rounded-xl text-sm font-bold shadow-md mb-2">WhatsApp</button>
                                    <button onClick={() => onEditar(r)} className="block w-full text-xs text-blue-500 font-bold">Editar</button>
                                </div>
                            </div>
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="bg-orange-50/50 p-6 rounded-3xl border border-orange-100">
                                    <p className="text-orange-700 font-black text-sm mb-4 uppercase">Entrada en Calor</p>
                                    {r.entrada.map((e, i) => (
                                        <div key={i} className="border-b border-orange-100/50 py-2 text-sm last:border-0">
                                            <div className="flex justify-between">
                                                <span className="font-medium">{e.ej}</span> <RenderSpecs e={e} gen={r.generalEntrada} />
                                            </div>
                                            {e.inst && <p className="text-[11px] text-orange-600 italic mt-0.5 truncate" title={e.inst}>{truncar(e.inst, 30)}</p>}
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-blue-50/50 p-6 rounded-3xl border border-blue-100">
                                    <p className="text-blue-700 font-black text-sm mb-4 uppercase">Rutina Principal</p>
                                    {r.principal.map((e, i) => (
                                        <div key={i} className="border-b border-blue-100/50 py-2 text-sm last:border-0">
                                            <div className="flex justify-between">
                                                <span className="font-medium">{e.ej}</span> <RenderSpecs e={e} gen={r.generalPrincipal} />
                                            </div>
                                            {e.inst && <p className="text-[11px] text-blue-600 italic mt-0.5 truncate" title={e.inst}>{truncar(e.inst, 30)}</p>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const VistaCalendario = ({ recordatorios, clientes, onNuevo }) => (
            <div className="p-8 max-w-5xl mx-auto text-slate-800">
                <div className="flex justify-between items-center mb-8"><h2 className="text-3xl font-black">Calendario</h2><button onClick={onNuevo} className="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold">+ Agendar</button></div>
                <div className="bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <table className="w-full text-left">
                        <thead className="bg-slate-50 border-b text-[10px] font-black text-slate-400 uppercase"><tr><th className="p-4">Fecha</th><th className="p-4">Cliente</th><th className="p-4">Tarea</th><th className="p-4">Estado</th></tr></thead>
                        <tbody className="divide-y text-sm font-medium">
                            {recordatorios.map(rec => (
                                <tr key={rec.id} className="hover:bg-slate-50">
                                    <td className="p-4">{formatFecha(rec.fecha)}</td>
                                    <td className="p-4 font-black">{clientes.find(c => c.id == rec.clienteId)?.nombre}</td>
                                    <td className="p-4">{rec.tipo}</td>
                                    <td className="p-4"><span className="bg-blue-100 text-blue-600 px-2 py-1 rounded-full text-[10px] font-black tracking-widest uppercase">Pendiente</span></td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            </div>
        );

        // --- FORMULARIOS ---

        const FormCliente = ({ editando, onCerrar, onGuardar }) => {
            const [f, setF] = useState(editando || { nombre: '', objetivo: '', peso: '', altura: '', lesiones: '', rutinas: [], cargas: [] });
            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-black">{editando ? 'Editar Ficha Cliente' : 'Nueva Ficha Cliente'}</h2>
                    <input className="w-full p-4 border rounded-2xl bg-slate-50" placeholder="Nombre completo" value={f.nombre} onChange={e=>setF({...f, nombre: e.target.value})} />
                    <div className="grid grid-cols-2 gap-4">
                        <input className="p-4 border rounded-2xl bg-slate-50" placeholder="Peso (kg)" type="number" value={f.peso} onChange={e=>setF({...f, peso: e.target.value})} />
                        <input className="p-4 border rounded-2xl bg-slate-50" placeholder="Altura (cm)" type="number" value={f.altura} onChange={e=>setF({...f, altura: e.target.value})} />
                    </div>
                    <input className="w-full p-4 border rounded-2xl bg-slate-50" placeholder="Objetivo" value={f.objetivo} onChange={e=>setF({...f, objetivo: e.target.value})} />
                    <textarea className="w-full p-4 border rounded-2xl bg-slate-50 h-32" placeholder="Lesiones, molestias u observaciones..." value={f.lesiones} onChange={e=>setF({...f, lesiones: e.target.value})} />
                    <div className="flex justify-end gap-3"><button onClick={onCerrar} className="px-6 py-2 font-bold">Cancelar</button><button onClick={()=>{onGuardar(f); onCerrar();}} className="bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold">Guardar Cambios</button></div>
                </div>
            );
        };

        const FormClase = ({ onCerrar, onGuardar }) => {
            const [nombre, setNombre] = useState('');
            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-black">Nueva Clase Grupal</h2>
                    <input className="w-full p-4 border rounded-2xl bg-slate-50 font-bold" placeholder="Nombre de la clase" value={nombre} onChange={e=>setNombre(e.target.value)} />
                    <div className="flex justify-end gap-3"><button onClick={onCerrar} className="px-6 py-2 font-bold">Cancelar</button><button onClick={()=>{onGuardar({nombre, rutinas: []}); onCerrar();}} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold">Crear Clase</button></div>
                </div>
            );
        };

        const FormRutinaCliente = ({ editando, onCerrar, onGuardar }) => {
            const [form, setForm] = useState(editando || { nombre: '', tipoSeccion: 'Ambas', diasCount: 1, dias: [{ nombre: 'Día 1', genEntrada: '', genPrincipal: '', entrada: [], principal: [] }] });
            const adjustDias = (count) => {
                let d = [...form.dias];
                if(count > d.length) for(let i=d.length; i<count; i++) d.push({ nombre: `Día ${i+1}`, genEntrada: '', genPrincipal: '', entrada: [], principal: [] });
                else d = d.slice(0, count);
                setForm({...form, diasCount: count, dias: d});
            };
            const updateEj = (dIdx, type, eIdx, field, val) => {
                const n = [...form.dias]; n[dIdx][type][eIdx][field] = val; setForm({...form, dias: n});
            };
            return (
                <div className="space-y-8">
                    <div className="flex justify-between items-center"><h2 className="text-3xl font-black">Planificar Rutina</h2>
                        <div className="flex gap-4">
                            <select className="p-3 border rounded-2xl font-bold bg-white text-sm" value={form.tipoSeccion} onChange={e=>setForm({...form, tipoSeccion: e.target.value})}><option value="Ambas">E. Calor + Rutina</option><option value="Solo Entrada">Solo Entrada</option><option value="Solo Rutina">Solo Rutina</option></select>
                            <select className="p-3 border rounded-2xl font-bold bg-white text-sm" value={form.diasCount} onChange={e=>adjustDias(parseInt(e.target.value))}>{[1,2,3,4,5].map(n=><option key={n} value={n}>{n} Días</option>)}</select>
                        </div>
                    </div>
                    <input className="w-full p-4 border rounded-2xl bg-slate-50 font-bold" placeholder="Nombre de la Rutina" value={form.nombre} onChange={e=>setForm({...form, nombre: e.target.value})} />
                    {form.dias.map((dia, dIdx) => (
                        <div key={dIdx} className="p-6 border-2 rounded-3xl bg-slate-50">
                            <input className="text-lg font-black mb-4 bg-transparent border-b" value={dia.nombre} onChange={e=>{const n=[...form.dias]; n[dIdx].nombre=e.target.value; setForm({...form, dias:n});}} />
                            <div className="grid md:grid-cols-2 gap-6">
                                {(form.tipoSeccion === 'Ambas' || form.tipoSeccion === 'Solo Entrada') && (
                                    <div className="p-4 rounded-2xl bg-white border">
                                        <div className="flex justify-between items-center mb-3 text-[10px] font-black uppercase text-orange-400">Entrada en Calor</div>
                                        {dia.entrada.map((ej, eIdx) => (
                                            <div key={eIdx} className="flex gap-1 mb-1 items-center">
                                                <input className="flex-1 p-1.5 border rounded text-[10px]" placeholder="Ej" value={ej.ej} onChange={e=>updateEj(dIdx, 'entrada', eIdx, 'ej', e.target.value)} />
                                                <input className="w-16 p-1.5 border rounded text-[10px]" placeholder="S x R" value={ej.s} onChange={e=>updateEj(dIdx, 'entrada', eIdx, 's', e.target.value)} />
                                                <input className="w-24 p-1.5 border rounded text-[10px]" placeholder="Instrucciones" value={ej.inst} onChange={e=>updateEj(dIdx, 'entrada', eIdx, 'inst', e.target.value)} />
                                                <button onClick={()=>{const n=[...form.dias]; n[dIdx].entrada=n[dIdx].entrada.filter((_, idx)=>idx!==eIdx); setForm({...form, dias:n});}} className="text-red-400 font-bold px-1">×</button>
                                            </div>
                                        ))}
                                        <button onClick={()=>{const n=[...form.dias]; n[dIdx].entrada.push({ej:'', s:'', r:'', t:'', inst:''}); setForm({...form, dias:n});}} className="text-[10px] font-black opacity-40 mt-2">+ AGREGAR</button>
                                    </div>
                                )}
                                {(form.tipoSeccion === 'Ambas' || form.tipoSeccion === 'Solo Rutina') && (
                                    <div className="p-4 rounded-2xl bg-white border">
                                        <div className="flex justify-between items-center mb-3 text-[10px] font-black uppercase text-blue-400">Principal</div>
                                        {dia.principal.map((ej, eIdx) => (
                                            <div key={eIdx} className="flex gap-1 mb-1 items-center">
                                                <input className="flex-1 p-1.5 border rounded text-[10px]" placeholder="Ej" value={ej.ej} onChange={e=>updateEj(dIdx, 'principal', eIdx, 'ej', e.target.value)} />
                                                <input className="w-16 p-1.5 border rounded text-[10px]" placeholder="S x R" value={ej.s} onChange={e=>updateEj(dIdx, 'principal', eIdx, 's', e.target.value)} />
                                                <input className="w-24 p-1.5 border rounded text-[10px]" placeholder="Instrucciones" value={ej.inst} onChange={e=>updateEj(dIdx, 'principal', eIdx, 'inst', e.target.value)} />
                                                <button onClick={()=>{const n=[...form.dias]; n[dIdx].principal=n[dIdx].principal.filter((_, idx)=>idx!==eIdx); setForm({...form, dias:n});}} className="text-red-400 font-bold px-1">×</button>
                                            </div>
                                        ))}
                                        <button onClick={()=>{const n=[...form.dias]; n[dIdx].principal.push({ej:'', s:'', r:'', t:'', inst:''}); setForm({...form, dias:n});}} className="text-[10px] font-black opacity-40 mt-2">+ AGREGAR</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    ))}
                    <div className="flex justify-end gap-3 pt-4 border-t sticky bottom-0 bg-white"><button onClick={onCerrar} className="px-6 py-2">Cancelar</button><button onClick={()=>{onGuardar({...form, fecha: new Date().toISOString().split('T')[0]}); onCerrar();}} className="bg-blue-600 text-white px-10 py-3 rounded-2xl font-black shadow-lg">Guardar Planificación</button></div>
                </div>
            );
        };

        const FormRutinaClase = ({ editando, onCerrar, onGuardar }) => {
            const [form, setForm] = useState(editando || { nombre: '', fechaClase: new Date().toISOString().split('T')[0], generalEntrada: '', generalPrincipal: '', entrada: [{ej: '', s: '', r: '', t: '', inst: ''}], principal: [{ej: '', s: '', r: '', t: '', inst: ''}] });
            const updateRow = (type, i, field, val) => { const newRows = [...form[type]]; newRows[i][field] = val; setForm({...form, [type]: newRows}); };
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-black">Planificar Clase</h2><input type="date" className="p-2 border rounded-xl" value={form.fechaClase} onChange={e=>setForm({...form, fechaClase: e.target.value})} /></div>
                    <input className="w-full p-4 border rounded-2xl bg-slate-50 font-bold" placeholder="Título" value={form.nombre} onChange={e=>setForm({...form, nombre: e.target.value})} />
                    <div className="grid md:grid-cols-1 gap-6">
                        {['entrada', 'principal'].map(type => (
                            <div key={type} className={`p-6 rounded-3xl border ${type==='entrada'?'bg-orange-50':'bg-blue-50'}`}>
                                <h3 className="font-black uppercase text-xs mb-4">{type==='entrada'?'Entrada en Calor':'Principal'}</h3>
                                {form[type].map((r, i) => (
                                    <div key={i} className="flex gap-1 mb-2 items-center">
                                        <input className="flex-1 p-2 border rounded-lg text-[10px]" placeholder="Ej" value={r.ej} onChange={e=>updateRow(type, i, 'ej', e.target.value)} />
                                        <input className="w-16 p-2 border rounded-lg text-[10px]" placeholder="S x R" value={r.s} onChange={e=>updateRow(type, i, 's', e.target.value)} />
                                        <input className="w-48 p-2 border rounded-lg text-[10px]" placeholder="Instrucciones/Descripción" value={r.inst} onChange={e=>updateRow(type, i, 'inst', e.target.value)} />
                                        <button onClick={()=>setForm({...form, [type]: form[type].filter((_, idx) => idx !== i)})} className="text-red-400 font-bold px-1">×</button>
                                    </div>
                                ))}
                                <button onClick={()=>setForm({...form, [type]: [...form[type], {ej:'',s:'',r:'',t:'', inst:''}]})} className="text-[10px] font-black opacity-60">+ AGREGAR</button>
                            </div>
                        ))}
                    </div>
                    <div className="flex justify-end gap-3 pt-4"><button onClick={onCerrar} className="px-6 py-2">Cancelar</button><button onClick={()=>{onGuardar(form); onCerrar();}} className="bg-slate-800 text-white px-8 py-3 rounded-2xl font-black">Guardar Plan</button></div>
                </div>
            );
        };

        const FormRecordatorio = ({ clientes, onCerrar, onGuardar }) => {
            const [form, setForm] = useState({ clienteId: '', fecha: new Date().toISOString().split('T')[0], tipo: 'Actualizar rutina', detalle: '' });
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-black">Agendar Tarea</h2>
                    <select className="w-full p-3 border rounded-xl" value={form.clienteId} onChange={e=>setForm({...form, clienteId: e.target.value})}><option value="">¿Para quién?</option>{clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</select>
                    <input type="date" className="w-full p-3 border rounded-xl" value={form.fecha} onChange={e=>setForm({...form, fecha: e.target.value})} />
                    <textarea className="w-full p-3 border rounded-xl" placeholder="Anotaciones..." onChange={e=>setForm({...form, detalle: e.target.value})} />
                    <div className="flex justify-end gap-3"><button onClick={onCerrar} className="px-6 py-2 font-bold">Cerrar</button><button onClick={()=>{onGuardar(form); onCerrar();}} className="bg-blue-600 text-white px-8 py-2 rounded-xl font-bold">Agendar</button></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
